<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İş Analisti Mülakat Hazırlık</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #191c27;
    --surface2: #1f2335;
    --border: #2a2e42;
    --accent: #6366f1;
    --accent-soft: rgba(99,102,241,0.12);
    --accent2: #22d3ee;
    --success: #10b981;
    --danger: #f43f5e;
    --warn: #f59e0b;
    --text: #e2e4f0;
    --muted: #8b8fa8;
    --easy: #10b981;
    --medium: #f59e0b;
    --hard: #f43f5e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: var(--accent); }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .toggle-sidebar-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 0.92rem;
    cursor: pointer;
    transition: all 0.18s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-toggle-handle {
    position: fixed;
    top: 116px;
    left: 0;
    min-width: 120px;
    height: 44px;
    padding: 0 12px;
    border-radius: 0 16px 16px 0;
    background: var(--accent);
    color: white;
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    z-index: 130;
    box-shadow: 2px 6px 24px rgba(0, 0, 0, 0.22);
    transition: left 0.2s ease, background 0.2s ease;
  }
  .sidebar-toggle-handle:hover { background: #4f52d3; }
  .sidebar-toggle-handle.open { left: 280px; }
  .sidebar-toggle-handle.closed { left: 0; }
  .toggle-sidebar-btn:hover {
    background: rgba(99,102,241,0.1);
  }
  .progress-pill {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.8rem;
  }
  .score-pill {
    background: rgba(16,185,129,0.1);
    border: 1px solid var(--success);
    color: var(--success);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.8rem;
  }

  /* LAYOUT */
  .app { min-height: calc(100vh - 61px); position: relative; padding: 24px 20px 40px; }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: fixed;
    left: 0;
    top: 61px;
    bottom: 0;
    overflow-y: auto;
    transition: transform 0.2s ease, opacity 0.2s ease;
    box-shadow: 4px 0 30px rgba(0, 0, 0, 0.15);
    transform: translateX(0);
    z-index: 120;
  }
  .sidebar.closed {
    transform: translateX(-100%);
    opacity: 0;
    pointer-events: none;
  }
  .sidebar.open {
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
  }
  .sidebar-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .cat-group { margin-bottom: 20px; }
  .cat-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 6px 8px;
    border-radius: 6px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-label.temel { color: var(--easy); background: rgba(16,185,129,0.08); }
  .cat-label.orta { color: var(--warn); background: rgba(245,158,11,0.08); }
  .cat-label.ileri { color: var(--danger); background: rgba(244,63,94,0.08); }
  .q-nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
    color: var(--muted);
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .q-nav-item:hover { background: var(--surface2); color: var(--text); }
  .q-nav-item.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .q-nav-item.answered-correct { color: var(--success); }
  .q-nav-item.answered-wrong { color: var(--danger); }
  .q-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.68rem;
    font-weight: 600;
    flex-shrink: 0;
  }
  .q-nav-item.active .q-num { background: var(--accent); color: white; }
  .q-nav-item.answered-correct .q-num { background: rgba(16,185,129,0.2); color: var(--success); }
  .q-nav-item.answered-wrong .q-num { background: rgba(244,63,94,0.2); color: var(--danger); }

  /* MAIN */
  .main {
    padding: 32px 40px;
    max-width: 820px;
    width: min(100%, 820px);
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* START SCREEN */
  .start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 24px;
  }
  .start-screen h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .start-screen h1 span { color: var(--accent); }
  .start-screen p { color: var(--muted); max-width: 480px; font-size: 1rem; }
  .stats-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    text-align: center;
  }
  .stat-card .n { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-card .l { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .start-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .start-btn:hover { background: #4f52d3; transform: translateY(-1px); }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .q-index {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 500;
  }
  .difficulty-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .difficulty-badge.Temel { background: rgba(16,185,129,0.12); color: var(--easy); border: 1px solid rgba(16,185,129,0.3); }
  .difficulty-badge.Orta { background: rgba(245,158,11,0.12); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }
  .difficulty-badge.İleri { background: rgba(244,63,94,0.12); color: var(--danger); border: 1px solid rgba(244,63,94,0.3); }
  .cat-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 500;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid rgba(99,102,241,0.3);
  }
  .type-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 500;
    background: rgba(34,211,238,0.08);
    color: var(--accent2);
    border: 1px solid rgba(34,211,238,0.25);
  }
  .q-text {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.65;
    margin-bottom: 24px;
    color: var(--text);
  }
  .case-box {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.7;
  }
  .case-box strong { color: var(--text); }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    transition: all 0.18s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .option-btn:disabled { cursor: default; }
  .option-btn.selected-correct { border-color: var(--success); background: rgba(16,185,129,0.08); color: var(--success); }
  .option-btn.selected-wrong { border-color: var(--danger); background: rgba(244,63,94,0.08); color: var(--danger); }
  .option-btn.reveal-correct { border-color: var(--success); background: rgba(16,185,129,0.06); color: var(--success); }
  .option-letter {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--muted);
    transition: all 0.18s;
  }
  .option-btn.selected-correct .option-letter { background: var(--success); color: white; }
  .option-btn.selected-wrong .option-letter { background: var(--danger); color: white; }
  .option-btn.reveal-correct .option-letter { background: var(--success); color: white; }
  .option-btn:hover:not(:disabled) .option-letter { background: var(--accent); color: white; }

  /* FEEDBACK */
  .feedback-box {
    margin-top: 20px;
    padding: 16px 18px;
    border-radius: 10px;
    font-size: 0.88rem;
    line-height: 1.7;
    display: none;
  }
  .feedback-box.correct { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); color: var(--success); }
  .feedback-box.wrong { background: rgba(244,63,94,0.08); border: 1px solid rgba(244,63,94,0.25); color: #f87171; }
  .feedback-box .fb-label { font-weight: 700; margin-bottom: 4px; display: block; }
  .feedback-box .fb-exp { color: var(--text); opacity: 0.85; }

  /* NAVIGATION */
  .q-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .nav-btn.primary:hover { background: #4f52d3; }

  /* RESULTS */
  .results-screen {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
  }
  .results-screen h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .big-score {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 5rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin: 20px 0;
  }
  .score-label { color: var(--muted); font-size: 0.9rem; }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 28px 0;
  }
  .result-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .result-cell .rc-n {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .result-cell .rc-l { font-size: 0.75rem; color: var(--muted); }
  .result-bar-wrapper { background: var(--surface2); border-radius: 999px; height: 12px; overflow: hidden; margin-top: 6px; }
  .result-bar { height: 100%; border-radius: 999px; }
  .filter-pill { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); color: var(--text); border-radius: 999px; padding: 8px 12px; cursor: pointer; font-size: 0.82rem; display: inline-flex; align-items: center; transition: all 0.18s; margin-bottom: 8px; }
  .filter-pill.active { background: var(--accent); border-color: var(--accent); color: white; }
  .verdict {
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    margin: 16px 0;
  }
  .verdict.great { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--success); }
  .verdict.good { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: var(--warn); }
  .verdict.low { background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); color: var(--danger); }
  .restart-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .restart-btn:hover { background: #4f52d3; }

  @media (max-width: 1024px) {
    .main { padding: 24px 20px; }
    .header { padding: 14px 20px; }
    .question-card { padding: 24px; }
    .result-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar {
      position: fixed;
      left: 0;
      top: 61px;
      bottom: 0;
      width: 280px;
      z-index: 120;
      transform: translateX(-100%);
      border-right: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 4px 0 30px rgba(0,0,0,0.3);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar.closed { transform: translateX(-100%); }
    .main { padding: 18px 16px; }
    .header { padding: 12px 16px; }
    .question-card { padding: 18px; }
    .result-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">İş Analisti <span>Quiz</span></div>
  <div class="header-meta">
    <div class="progress-pill" id="headerProgress">Başlamadı</div>
    <div class="score-pill" id="headerScore" style="display:none">Puan: 0</div>
    <div class="score-pill" id="headerTime" style="display:none">Süre: 00:00</div>
  </div>
</div>

<button class="sidebar-toggle-handle closed" onclick="toggleSidebar()" id="sidebarToggle">☰ Sorular</button>

<div class="app">
  <div class="sidebar closed" id="sidebar">
    <div class="sidebar-title">Sorular</div>
    <div id="sidebarContent"></div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
const questions = [
  // ─── BÖLÜM 1: TEMEL IA KAVRAMLARI ───────────────────────────
  {
    id: 1, diff: "Temel", cat: "Temel Kavramlar", type: "Bilgi",
    q: "İş analistinin temel rolü hangisidir?",
    opts: ["Yazılım geliştirmek","İş ihtiyaçlarını ve paydaş beklentilerini analiz ederek çözümler önermek","Proje bütçesini yönetmek","Sunucu altyapısını kurmak"],
    ans: 1, exp: "İş analisti; paydaşların ihtiyaçlarını anlar, süreçleri modeller ve uygulanabilir çözümler önerir. Teknik geliştirme veya altyapı yönetimi birincil sorumluluk değildir."
  },
  {
    id: 2, diff: "Temel", cat: "Temel Kavramlar", type: "Bilgi",
    q: "BABOK (Business Analysis Body of Knowledge) hangi kurumun yayınladığı standarttır?",
    opts: ["PMI","IIBA","ISO","ITIL"],
    ans: 1, exp: "BABOK, IIBA (International Institute of Business Analysis) tarafından yayınlanmakta olup iş analizi disiplininin temel kılavuzu olarak kabul edilmektedir."
  },
  {
    id: 3, diff: "Temel", cat: "Temel Kavramlar", type: "Bilgi",
    q: "Bir iş gereksinimi (business requirement) ile sistem gereksinimi (system requirement) arasındaki temel fark nedir?",
    opts: ["İş gereksinimi teknik, sistem gereksinimi iş odaklıdır","İş gereksinimi 'ne isteniyor'u, sistem gereksinimi 'sistemin ne yapması gerektiğini' tanımlar","İkisi aynı anlama gelir","Sistem gereksinimleri yalnızca yazılım ekibine aittir"],
    ans: 1, exp: "İş gereksinimleri organizasyonun ihtiyaç ve hedeflerini; sistem gereksinimleri bu ihtiyaçları karşılamak için sistemin sergilemesi gereken davranışları tanımlar."
  },
  {
    id: 4, diff: "Temel", cat: "Temel Kavramlar", type: "Bilgi",
    q: "Paydaş (stakeholder) kimdir?",
    opts: ["Yalnızca son kullanıcılar","Yalnızca sponsor ve yöneticiler","Bir değişimden etkilenen veya değişimi etkileyen herhangi bir kişi ya da grup","Yalnızca geliştirme ekibi"],
    ans: 2, exp: "Paydaş; müşteriler, son kullanıcılar, sponsorlar, düzenleyici kurumlar, tedarikçiler ve geliştiriciler dahil olmak üzere projeden etkilenen ya da projeyi etkileyen herkesi kapsar."
  },
  {
    id: 5, diff: "Temel", cat: "Temel Kavramlar", type: "Bilgi",
    q: "Kapsam kayması (scope creep) ne anlama gelir?",
    opts: ["Projenin erken tamamlanması","Onaysız ve kontrolsüz kapsam genişlemesi","Proje bütçesinin azalması","Test süreçlerinin uzaması"],
    ans: 1, exp: "Scope creep, resmi değişiklik yönetimi süreci izlenmeksizin proje kapsamının giderek genişlemesidir. Bu durum bütçe aşımına, gecikmelere ve kalite sorunlarına yol açar."
  },
  {
    id: 6, diff: "Temel", cat: "Temel Kavramlar", type: "Bilgi",
    q: "Fonksiyonel olmayan gereksinim (non-functional requirement) örneği hangisidir?",
    opts: ["Kullanıcı sisteme giriş yapabilmeli","Sipariş oluşturabilmeli","Sistem %99,9 erişilebilirlik sunmalı","Rapor oluşturabilmeli"],
    ans: 2, exp: "Fonksiyonel olmayan gereksinimler; performans, güvenlik, ölçeklenebilirlik ve erişilebilirlik gibi sistemin 'nasıl' davranacağını tanımlar. Giriş ve sipariş gibi örnekler fonksiyonel gereksinimlerdir."
  },
  {
    id: 7, diff: "Temel", cat: "Temel Kavramlar", type: "Bilgi",
    q: "BPM (Business Process Management) ne anlama gelir?",
    opts: ["İş süreçlerini modelleme, izleme ve iyileştirme disiplini","Yazılım proje yönetimi metodolojisi","Veri tabanı tasarım yöntemi","Müşteri ilişkileri yönetimi"],
    ans: 0, exp: "BPM; iş süreçlerini sistematik olarak tanımlama, modelleme, uygulama, izleme ve sürekli iyileştirme pratiğidir."
  },
  {
    id: 8, diff: "Temel", cat: "Gereksinim Toplama", type: "Bilgi",

    ans: 1, exp: "Value/Effort matrisi: Yüksek değer + düşük çaba (B) = 'quick win', önce yap. Yüksek değer + yüksek çaba (A) = 'major project', sıradaki. Düşük değer + düşük çaba (C) = kaynak varsa. Düşük değer + yüksek çaba (D) = yapmayın. Bu çerçeve kaynakları en yüksek ROI'ya yönlendirir."
  }
];

// ── APP STATE ──
let state = {
  phase: 'start',
  current: 0,
  answers: {},
  score: 0,
  startTime: null,
  elapsed: 0,
  timerInterval: null,
  mode: 'exam',
  timeLimit: null,
  sidebarOpen: false,
  resultFilters: { Temel: true, Orta: true, İleri: true, Bilgi: true, Teknik: true, Yorum: true, Case: true },
  questionOrder: questions.map((_, i) => i)
};

function formatDuration(ms) {
  const totalSeconds = Math.max(0, Math.floor(ms / 1000));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function prepareQuestions() {
  questions.forEach(q => {
    const items = q.opts.map((text, index) => ({ text, isCorrect: index === q.ans }));
    shuffleArray(items);
    q.optsShuffled = items.map(item => item.text);
    q.shuffledAns = items.findIndex(item => item.isCorrect);
  });
}

function getRandomIndexes(count, total) {
  const indexes = [...Array(total).keys()];
  shuffleArray(indexes);
  return indexes.slice(0, count);
}

function getSelectedCustomConfig() {
  const minutes = parseInt(document.getElementById('customDuration')?.value, 10);
  const desired = {
    Temel: parseInt(document.getElementById('customCountTemel')?.value, 10),
    Orta: parseInt(document.getElementById('customCountOrta')?.value, 10),
    İleri: parseInt(document.getElementById('customCountIleri')?.value, 10)
  };
  const types = {
    Bilgi: document.getElementById('customTypeBilgi')?.checked,
    Teknik: document.getElementById('customTypeTeknik')?.checked,
    Yorum: document.getElementById('customTypeYorum')?.checked,
    Case: document.getElementById('customTypeCase')?.checked
  };
  return {
    duration: Number.isFinite(minutes) && minutes > 0 ? minutes : 15,
    counts: {
      Temel: Number.isFinite(desired.Temel) && desired.Temel >= 0 ? desired.Temel : 3,
      Orta: Number.isFinite(desired.Orta) && desired.Orta >= 0 ? desired.Orta : 4,
      İleri: Number.isFinite(desired.İleri) && desired.İleri >= 0 ? desired.İleri : 3
    },
    types: Object.keys(types).some(key => types[key]) ? types : { Bilgi: true, Teknik: true, Yorum: true, Case: true }
  };
}

function buildCustomQuestionOrder(config) {
  const selected = [];
  ['Temel', 'Orta', 'İleri'].forEach(diff => {
    const candidates = questions
      .map((q, i) => ({ q, i }))
      .filter(({ q }) => q.diff === diff && config.types[q.type]);
    shuffleArray(candidates);
    const count = Math.min(config.counts[diff], candidates.length);
    selected.push(...candidates.slice(0, count).map(item => item.i));
  });
  if (!selected.length) {
    return questions.map((_, i) => i);
  }
  shuffleArray(selected);
  return selected;
}

function getActiveQuestions() {
  return state.questionOrder.map(index => questions[index]);
}

function getCatGroups() {
  const groups = { Temel: [], Orta: [], İleri: [] };
  getActiveQuestions().forEach((q, i) => {
    groups[q.diff].push({ q, i });
  });
  return groups;
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('open', state.sidebarOpen);
  sidebar.classList.toggle('closed', !state.sidebarOpen);
  const sidebarToggle = document.getElementById('sidebarToggle');
  if (sidebarToggle) {
    sidebarToggle.classList.toggle('open', state.sidebarOpen);
    sidebarToggle.classList.toggle('closed', !state.sidebarOpen);
  }
  if (state.phase === 'start') { document.getElementById('sidebarContent').innerHTML = ''; return; }
  const groups = getCatGroups();
  const diffLabels = { Temel: 'temel', Orta: 'orta', İleri: 'ileri' };
  let html = '';
  Object.entries(groups).forEach(([diff, items]) => {
    if (!items.length) return;
    html += `<div class="cat-group">
      <div class="cat-label ${diffLabels[diff]}">${diff === 'Temel' ? '🟢' : diff === 'Orta' ? '🟡' : '🔴'} ${diff}</div>`;
    items.forEach(({ q, i }) => {
      let cls = 'q-nav-item';
      if (i === state.current) cls += ' active';
      else if (state.answers[q.id] !== undefined) {
        cls += state.answers[q.id].correct ? ' answered-correct' : ' answered-wrong';
      }
      html += `<div class="${cls}" onclick="goTo(${i})">
        <div class="q-num">${q.id}</div>
        <span style="font-size:0.74rem;line-height:1.3">${q.cat}</span>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('sidebarContent').innerHTML = html;
}

function updateHeader() {
  const activeQuestions = getActiveQuestions();
  const total = activeQuestions.length;
  const answered = Object.keys(state.answers).length;
  const prog = document.getElementById('headerProgress');
  const sc = document.getElementById('headerScore');
  const timePill = document.getElementById('headerTime');
  if (state.phase === 'start') {
    prog.textContent = 'Başlamadı';
    sc.style.display = 'none';
    timePill.style.display = 'none';
    return;
  }
  timePill.style.display = 'inline';
  if (state.timeLimit) {
    const remaining = Math.max(0, state.timeLimit - state.elapsed);
    timePill.textContent = `Kalan: ${formatDuration(remaining)}`;
  } else {
    timePill.textContent = `Süre: ${formatDuration(state.elapsed)}`;
  }
  if (state.phase === 'results') {
    prog.textContent = 'Tamamlandı';
    sc.style.display = 'inline';
    sc.textContent = `Puan: ${state.score}/${total}`;
    return;
  }
  prog.textContent = `${answered}/${total} cevaplandı`;
  sc.style.display = 'inline';
  sc.textContent = `Doğru: ${state.score}`;
}

function renderQuestion(main) {
  const activeQuestions = getActiveQuestions();
  const q = activeQuestions[state.current];
  const answered = state.answers[q.id];
  const letters = ['A', 'B', 'C', 'D'];

  let caseHtml = '';
  if (q.case) {
    caseHtml = `<div class="case-box"><strong>Senaryo:</strong> ${q.case}</div>`;
  }

  let optionsHtml = q.optsShuffled.map((opt, i) => {
    let cls = 'option-btn';
    if (answered !== undefined) {
      if (i === q.shuffledAns) cls += ' reveal-correct';
      else if (i === answered.selected) cls += ' selected-wrong';
    }
    return `<button class="${cls}" ${answered !== undefined ? 'disabled' : ''} onclick="selectAnswer(${i})">
      <div class="option-letter">${letters[i]}</div>
      <span>${opt}</span>
    </button>`;
  }).join('');

  let feedbackHtml = '';
  if (answered !== undefined) {
    const correctLetter = letters[q.shuffledAns];
    const correctOpt = q.optsShuffled[q.shuffledAns];
    const fb = answered.correct
      ? `<span class="fb-label">✅ Doğru!</span><span class="fb-exp">${q.exp}</span>`
      : `<span class="fb-label">❌ Yanlış. Doğru cevap: ${correctLetter} — ${correctOpt}</span><span class="fb-exp">${q.exp}</span>`;
    feedbackHtml = `<div class="feedback-box ${answered.correct ? 'correct' : 'wrong'}" style="display:block">${fb}</div>`;
  }

  const isLast = state.current === activeQuestions.length - 1;

  main.innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-index">Soru ${state.current + 1} / ${activeQuestions.length}</span>
        <span class="difficulty-badge ${q.diff}">${q.diff}</span>
        <span class="cat-badge">${q.cat}</span>
        <span class="type-badge">${q.type}</span>
      </div>
      ${caseHtml}
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
    </div>
    <div class="q-nav">
      <button class="nav-btn" onclick="navigate(-1)" ${state.current === 0 ? 'disabled' : ''}>← Önceki</button>
      <span style="font-size:0.8rem;color:var(--muted)">${Object.keys(state.answers).length} / ${activeQuestions.length} cevaplandı</span>
      ${isLast && answered !== undefined
        ? `<button class="nav-btn primary" onclick="showResults()">Sonuçları Gör →</button>`
        : `<button class="nav-btn" onclick="navigate(1)" ${answered === undefined && !isLast ? 'disabled' : isLast ? 'disabled' : ''}>Sonraki →</button>`
      }
      <button class="nav-btn" style="background:var(--danger);border-color:var(--danger);color:white" onclick="exitQuiz()">Sınavdan Çık</button>
    </div>`;
}

function selectAnswer(idx) {
  const activeQuestions = getActiveQuestions();
  const q = activeQuestions[state.current];
  if (state.answers[q.id] !== undefined) return;
  const correct = idx === q.shuffledAns;
  state.answers[q.id] = { selected: idx, correct };
  if (correct) state.score++;
  render();
}

function navigate(dir) {
  const activeQuestions = getActiveQuestions();
  state.current = Math.max(0, Math.min(activeQuestions.length - 1, state.current + dir));
  render();
}

function goTo(i) {
  state.current = i;
  render();
}

function startTimer() {
  clearTimer();
  state.startTime = Date.now();
  state.timerInterval = setInterval(() => {
    state.elapsed = Date.now() - state.startTime;
    if (state.timeLimit && state.elapsed >= state.timeLimit) {
      state.elapsed = state.timeLimit;
      updateHeader();
      showResults();
      return;
    }
    updateHeader();
  }, 1000);
}

function clearTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  render();
}

function toggleResultFilter(name) {
  state.resultFilters[name] = !state.resultFilters[name];
  render();
}

function exitQuiz() {
  clearTimer();
  state = {
    phase: 'start',
    current: 0,
    answers: {},
    score: 0,
    startTime: null,
    elapsed: 0,
    timerInterval: null,
    mode: 'exam',
    timeLimit: null,
    sidebarOpen: false,
    resultFilters: { Temel: true, Orta: true, İleri: true, Bilgi: true, Teknik: true, Yorum: true, Case: true },
    questionOrder: questions.map((_, i) => i)
  };
  render();
}

function startQuiz(mode = 'exam') {
  state.phase = 'quiz';
  state.mode = mode;
  state.current = 0;
  state.answers = {};
  state.score = 0;
  state.elapsed = 0;
  if (mode === 'custom') {
    const config = getSelectedCustomConfig();
    state.questionOrder = buildCustomQuestionOrder(config);
    state.timeLimit = config.duration * 60 * 1000;
  } else if (mode === 'flash') {
    state.questionOrder = getRandomIndexes(10, questions.length);
    state.timeLimit = null;
  } else {
    state.questionOrder = questions.map((_, i) => i);
    state.timeLimit = null;
  }
  state.sidebarOpen = false;
  state.resultFilters = { Temel: true, Orta: true, İleri: true, Bilgi: true, Teknik: true, Yorum: true, Case: true };
  prepareQuestions();
  startTimer();
  render();
}

function showResults() {
  state.phase = 'results';
  const elapsed = Date.now() - state.startTime;
  state.elapsed = state.timeLimit ? Math.min(elapsed, state.timeLimit) : elapsed;
  clearTimer();
  render();
}

function renderResults(main) {
  const activeQuestions = getActiveQuestions();
  const total = activeQuestions.length;
  const answeredCount = Object.keys(state.answers).length;
  const wrongCount = answeredCount - state.score;
  const unansweredCount = total - answeredCount;
  const pct = Math.round((state.score / total) * 100);
  let verdict, vclass;
  if (pct >= 80) { verdict = '🏆 Mükemmel! Mülakat için hazırsınız.'; vclass = 'great'; }
  else if (pct >= 60) { verdict = '📈 İyi gidiyorsunuz! Zayıf olduğunuz kategorileri tekrar edin.'; vclass = 'good'; }
  else { verdict = '📚 Temel konuları pekiştirin ve tekrar deneyin.'; vclass = 'low'; }

  const byDiff = { Temel: { c: 0, t: 0 }, Orta: { c: 0, t: 0 }, İleri: { c: 0, t: 0 } };
  const byType = { Bilgi: { c: 0, t: 0 }, Teknik: { c: 0, t: 0 }, Yorum: { c: 0, t: 0 }, Case: { c: 0, t: 0 } };
  const missed = [];

  activeQuestions.forEach(q => {
    const answered = state.answers[q.id];
    const correct = answered?.correct ?? false;
    byDiff[q.diff].t++;
    byType[q.type].t++;
    if (correct) {
      byDiff[q.diff].c++;
      byType[q.type].c++;
    } else {
      missed.push({ q, status: answered ? 'Yanlış' : 'Boş' });
    }
  });

  const typeStats = Object.entries(byType).map(([type, data]) => ({
    label: type,
    correct: data.c,
    total: data.t,
    pct: data.t ? Math.round((data.c / data.t) * 100) : 0,
    color: 'var(--accent2)'
  }));

  const diffStats = Object.entries(byDiff).map(([diff, data]) => ({
    label: diff,
    correct: data.c,
    total: data.t,
    pct: data.t ? Math.round((data.c / data.t) * 100) : 0,
    color: diff === 'Temel' ? 'var(--easy)' : diff === 'Orta' ? 'var(--warn)' : 'var(--danger)'
  }));

  const displayStats = [...diffStats, ...typeStats];

  const priorities = displayStats
    .filter(item => item.total > 0)
    .sort((a, b) => a.pct - b.pct)
    .slice(0, 3)
    .map(item => `${item.label} (${item.pct}% doğru)`);

  const recommendation = priorities.length > 0
    ? `İlk olarak düşük başarı oranı olan alanlara odaklan: ${priorities.join(', ')}.`
    : 'Güzel! Tüm sorularda dengeli bir başarı gösteriyorsunuz.';

  const filterKeys = displayStats.map(item => item.label);
  const filterHtml = filterKeys.map(name => `
      <button class="filter-pill ${state.resultFilters[name] ? 'active' : ''}" onclick="toggleResultFilter('${name}')">${name}</button>
    `).join('');

  const filteredMissed = missed.filter(item => state.resultFilters[item.q.diff] && state.resultFilters[item.q.type]);
  const missedHtml = filteredMissed.slice(0, 6).map(item => {
    return `<li><strong>${item.status}</strong> - [${item.q.diff}/${item.q.type}] ${item.q.q}</li>`;
  }).join('');

  const endedByTime = state.timeLimit && state.elapsed >= state.timeLimit;

  main.innerHTML = `
    <div class="results-screen">
      <h2>Sonuçların Hazır!</h2>
      ${endedByTime ? '<div class="verdict low">⏱ Süre doldu. Eksik kalan sorular, sonuçlara yanlış olarak eklendi.</div>' : ''}
      <div class="big-score">${pct}%</div>
      <div class="score-label">${state.score} / ${total} doğru</div>
      <div class="result-grid">
        <div class="result-cell"><div class="rc-n" style="color:var(--easy)">${byDiff['Temel'].c}/${byDiff['Temel'].t}</div><div class="rc-l">🟢 Temel</div></div>
        <div class="result-cell"><div class="rc-n" style="color:var(--warn)">${byDiff['Orta'].c}/${byDiff['Orta'].t}</div><div class="rc-l">🟡 Orta</div></div>
        <div class="result-cell"><div class="rc-n" style="color:var(--danger)">${byDiff['İleri'].c}/${byDiff['İleri'].t}</div><div class="rc-l">🔴 İleri</div></div>
      </div>
      <div style="margin-top:18px;text-align:left">
        <div style="font-weight:700;margin-bottom:12px">Performans Grafiği</div>
        <div style="display:grid;gap:14px">
          ${displayStats.map(stat => `
            <div>
              <div style="display:flex;justify-content:space-between;font-size:0.88rem;color:var(--muted);margin-bottom:6px">
                <span>${stat.label}</span><span>${stat.pct}%</span>
              </div>
              <div class="result-bar-wrapper"><div class="result-bar" style="width:${stat.pct}%;background:${stat.color}"></div></div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="verdict ${vclass}">${verdict}</div>
      <div style="margin-top:14px;color:var(--text);line-height:1.65">${recommendation}</div>
      <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:22px">
        <div class="result-cell"><div class="rc-n">${answeredCount}</div><div class="rc-l">Cevaplanan</div></div>
        <div class="result-cell"><div class="rc-n" style="color:var(--danger)">${wrongCount + unansweredCount}</div><div class="rc-l">Yanlış/Boş</div></div>
        <div class="result-cell"><div class="rc-n">${formatDuration(state.elapsed)}</div><div class="rc-l">Geçen Süre</div></div>
      </div>
      <div style="margin-top:22px;text-align:left">
        <div style="font-weight:700;margin-bottom:10px">Daha Fazla Çalış</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">${filterHtml}</div>
        <div style="font-size:0.9rem;color:var(--muted);margin-bottom:12px">Seçili alanlarda yanlış/boş sorular listeleniyor.</div>
        <ul style="padding-left:18px;color:var(--muted);font-size:0.9rem;line-height:1.6">${missedHtml || '<li>Tebrikler! Filtrelenen alanda yanlış ya da boş soru bulunamadı.</li>'}</ul>
      </div>
      <button class="restart-btn" onclick="exitQuiz()">Ana ekrana dön</button>
    </div>`;
}

function restart() {
  clearTimer();
  state = {
    phase: 'start',
    current: 0,
    answers: {},
    score: 0,
    startTime: null,
    elapsed: 0,
    timerInterval: null,
    mode: 'exam',
    timeLimit: null,
    sidebarOpen: false,
    resultFilters: { Temel: true, Orta: true, İleri: true, Bilgi: true, Teknik: true, Yorum: true, Case: true },
    questionOrder: questions.map((_, i) => i)
  };
  render();
}

window.addEventListener('resize', () => {
  if (state.sidebarOpen) {
    state.sidebarOpen = false;
    renderSidebar();
  }
});

render();
</script>
</body>
</html>
